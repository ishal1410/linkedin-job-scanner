<svg xmlns="http://www.w3.org/2000/svg" width="840" height="180" font-family="SFMono-Regular, Consolas, Menlo, monospace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0a66c2"/>
      <stop offset="1" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <rect width="840" height="180" rx="14" fill="url(#bg)"/>

  <!-- little terminal glyph -->
  <g transform="translate(48,54)">
    <rect width="120" height="80" rx="8" fill="#0d1117" stroke="#2f81f7" stroke-width="1.5"/>
    <circle cx="14" cy="14" r="4" fill="#ff5f56"/><circle cx="30" cy="14" r="4" fill="#ffbd2e"/><circle cx="46" cy="14" r="4" fill="#27c93f"/>
    <text x="14" y="42" fill="#27c93f" font-size="13">$ scan</text>
    <text x="14" y="62" fill="#3fb950" font-size="13">+ 29 jobs</text>
  </g>

  <text x="210" y="78" fill="#ffffff" font-size="34" font-weight="bold" font-family="Arial, Helvetica, sans-serif">LinkedIn Job Scanner</text>
  <text x="212" y="108" fill="#c9d1d9" font-size="16" font-family="Arial, Helvetica, sans-serif">Fresh LinkedIn jobs in a spreadsheet, without ever logging in.</text>

  <g font-family="Arial, Helvetica, sans-serif" font-size="12" fill="#ffffff">
    <rect x="212" y="126" width="120" height="24" rx="12" fill="#ffffff" fill-opacity="0.12"/><text x="272" y="142" text-anchor="middle">no login required</text>
    <rect x="340" y="126" width="118" height="24" rx="12" fill="#ffffff" fill-opacity="0.12"/><text x="399" y="142" text-anchor="middle">zero dependencies</text>
    <rect x="466" y="126" width="96" height="24" rx="12" fill="#ffffff" fill-opacity="0.12"/><text x="514" y="142" text-anchor="middle">any job field</text>
  </g>
</svg>
