name: Feature request
description: Suggest an idea or improvement.
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: What are you trying to do?
      description: Describe the problem or the workflow you wish were easier.
    validations:
      required: true
  - type: textarea
    id: idea
    attributes:
      label: What would you like to see?
      description: Your proposed solution, if you have one in mind.
    validations:
      required: false
